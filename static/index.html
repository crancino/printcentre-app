<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintCentre</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    button {
      background-color: #0052CC;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background-color: #0065FF;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 3px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 90%;
    }
    .modal-header {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .modal-body {
      margin-bottom: 20px;
    }
    .close-btn {
      background-color: #6c757d;
    }
    .close-btn:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [modalOpen, setModalOpen] = useState(false);

      const openModal = () => {
        setModalOpen(true);
      };

      const closeModal = () => {
        setModalOpen(false);
      };

      return (
        <div className="container">
          <h2>PrintCentre</h2>
          <p>Click the button below to open the print dialog:</p>
          <button onClick={openModal}>Open Print Dialog</button>

          <div className={`modal ${modalOpen ? 'open' : ''}`}>
            <div className="modal-content">
              <div className="modal-header">Print Request</div>
              <div className="modal-body">
                <p>This is where the print logic will go.</p>
                <p>Request details will be displayed here.</p>
              </div>
              <button className="close-btn" onClick={closeModal}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
