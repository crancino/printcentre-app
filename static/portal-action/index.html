<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload to PrintCentre</title>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="module">
        import { invoke, view } from '@forge/bridge';
        
        const { createElement: h } = React;
        const { createRoot } = ReactDOM;

        function PortalAction() {
            const [issue, setIssue] = React.useState(null);
            const [files, setFiles] = React.useState([]);
            const [uploading, setUploading] = React.useState(false);
            const [message, setMessage] = React.useState('');

            React.useEffect(() => {
                async function loadIssueData() {
                    try {
                        const context = await invoke('getContext');
                        setIssue(context);
                        
                        // Load existing files
                        const result = await invoke('getFiles', { issueKey: context.extension.issue.key });
                        setFiles(result.files || []);
                    } catch (error) {
                        console.error('Error loading issue data:', error);
                        setMessage('Error loading data');
                    }
                }
                loadIssueData();
            }, []);

            const handleFileUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setUploading(true);
                setMessage('Uploading...');
                
                try {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result.split(',')[1];
                        await invoke('uploadFile', {
                            issueKey: issue.extension.issue.key,
                            fileName: file.name,
                            fileData: base64,
                            mimeType: file.type
                        });
                        
                        setMessage('File uploaded successfully!');
                        
                        // Reload files
                        const result = await invoke('getFiles', { issueKey: issue.extension.issue.key });
                        setFiles(result.files || []);
                        
                        // Close modal after 2 seconds
                        setTimeout(() => {
                            view.close();
                        }, 2000);
                    };
                    reader.readAsDataURL(file);
                } catch (error) {
                    console.error('Error uploading file:', error);
                    setMessage('Error uploading file');
                } finally {
                    setUploading(false);
                }
            };

            const handleClose = () => {
                view.close();
            };

            return h('div', { style: { padding: '30px', fontFamily: 'system-ui, -apple-system, sans-serif', maxWidth: '500px' } }, [
                h('h2', { key: 'title', style: { marginTop: 0, marginBottom: '20px' } }, 'Upload to PrintCentre'),
                
                issue && h('div', { key: 'issue-info', style: { marginBottom: '20px', padding: '10px', backgroundColor: '#f4f5f7', borderRadius: '4px' } }, [
                    h('strong', { key: 'label' }, 'Request: '),
                    h('span', { key: 'key' }, issue.extension.issue.key)
                ]),

                h('div', { key: 'upload-section', style: { marginBottom: '20px' } }, [
                    h('label', { 
                        key: 'label',
                        style: { 
                            display: 'block', 
                            marginBottom: '10px',
                            fontWeight: '500' 
                        } 
                    }, 'Select file to upload:'),
                    h('input', {
                        key: 'file-input',
                        type: 'file',
                        onChange: handleFileUpload,
                        disabled: uploading,
                        style: { 
                            display: 'block', 
                            width: '100%',
                            padding: '8px',
                            border: '1px solid #ddd',
                            borderRadius: '4px'
                        }
                    })
                ]),

                message && h('div', { 
                    key: 'message',
                    style: { 
                        padding: '10px', 
                        marginBottom: '20px',
                        backgroundColor: message.includes('Error') ? '#ffebe6' : '#e3fcef',
                        color: message.includes('Error') ? '#de350b' : '#006644',
                        borderRadius: '4px'
                    } 
                }, message),

                files.length > 0 && h('div', { key: 'files-section', style: { marginBottom: '20px' } }, [
                    h('h4', { key: 'files-title', style: { marginBottom: '10px' } }, 'Previously Uploaded Files:'),
                    h('ul', { key: 'files-list', style: { listStyle: 'none', padding: 0 } },
                        files.map((file, idx) => 
                            h('li', { 
                                key: idx, 
                                style: { 
                                    padding: '8px', 
                                    border: '1px solid #ddd', 
                                    borderRadius: '4px', 
                                    marginBottom: '6px',
                                    fontSize: '14px'
                                } 
                            }, file.name)
                        )
                    )
                ]),

                h('div', { key: 'actions', style: { display: 'flex', gap: '10px', justifyContent: 'flex-end' } }, [
                    h('button', {
                        key: 'close',
                        onClick: handleClose,
                        style: {
                            padding: '8px 16px',
                            border: '1px solid #ddd',
                            borderRadius: '4px',
                            backgroundColor: '#fff',
                            cursor: 'pointer'
                        }
                    }, 'Close')
                ])
            ]);
        }

        const root = createRoot(document.getElementById('root'));
        root.render(h(PortalAction));
    </script>
</body>
</html>
