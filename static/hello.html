<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PrintCentre</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f4f5f7;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0 0 15px 0;
      color: #172b4d;
      font-size: 18px;
    }
    .status {
      padding: 10px;
      background: #e3fcef;
      border-left: 3px solid #00875a;
      border-radius: 3px;
      margin: 15px 0;
    }
    button {
      background: #0052cc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background: #0065ff;
    }
    .debug {
      margin-top: 20px;
      padding: 10px;
      background: #f4f5f7;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>??? PrintCentre App</h2>
    <div class="status">
      ? App is loaded and visible!
    </div>
    <p>This confirms the Forge app is working.</p>
    <button onclick="testClick()">Test Button Click</button>
    <div id="debug" class="debug"></div>
  </div>

  <script>
    console.log('=== PRINTCENTRE APP LOADED ===');
    console.log('Timestamp:', new Date().toISOString());
    
    function testClick() {
      console.log('Button clicked!');
      document.getElementById('debug').innerHTML = 
        'Button clicked at: ' + new Date().toLocaleTimeString();
    }
    
    // Add visible marker to console
    console.log('%c??? PrintCentre App Running', 'color: green; font-size: 16px; font-weight: bold;');
  </script>
</body>
</html>
